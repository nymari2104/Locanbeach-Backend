# ============================================
# HOTEL CHATBOT MVP - Local Development
# Ocean Breeze Resort - AI Chatbot System
# ============================================

services:
  # ── PostgreSQL with pgvector ──
  postgres:
    image: pgvector/pgvector:pg17
    container_name: hotel-chatbot-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-hotel_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-your_secure_password_here}
      POSTGRES_DB: ${POSTGRES_DB:-hotel_chatbot}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db:/docker-entrypoint-initdb.d
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-hotel_admin} -d ${POSTGRES_DB:-hotel_chatbot}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - hotel-chatbot-net

  # ── n8n Automation Engine ──
  n8n:
    image: n8nio/n8n:latest
    container_name: hotel-chatbot-n8n
    restart: unless-stopped
    environment:
      # Database connection (n8n internal data)
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_DATABASE: ${POSTGRES_DB:-hotel_chatbot}
      DB_POSTGRESDB_USER: ${POSTGRES_USER:-hotel_admin}
      DB_POSTGRESDB_PASSWORD: ${POSTGRES_PASSWORD:-your_secure_password_here}
      DB_POSTGRESDB_SCHEMA: n8n
      # n8n Config
      N8N_HOST: localhost
      N8N_PORT: 5678
      N8N_PROTOCOL: http
      WEBHOOK_URL: http://localhost:5678/
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY:-mvp-local-encryption-key-change-in-prod}
      # Timezone Vietnam
      GENERIC_TIMEZONE: Asia/Ho_Chi_Minh
      TZ: Asia/Ho_Chi_Minh
      # Enable AI features
      N8N_AI_ENABLED: "true"
      # Credentials from .env
      N8N_RUNNERS_ENABLED: "true"
      # Environment Variable Access
      GOOGLE_AI_API_KEY: ${GOOGLE_AI_API_KEY}
      N8N_ENFORCE_SETTINGS_FILE_FOR_ENV_VARIABLES: "false"
      # Whitelist local folder access
      N8N_RESTRICT_FILE_ACCESS_TO: "/home/node/knowledge"
    dns:
      - 8.8.8.8
      - 1.1.1.1
    volumes:
      - n8n_data:/home/node/.n8n
      - ./knowledge:/home/node/knowledge
    ports:
      - "${N8N_PORT:-5678}:5678"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - hotel-chatbot-net

  # ── Adminer (Database Management Web UI) ──
  adminer:
    image: adminer:latest
    container_name: hotel-chatbot-adminer
    restart: unless-stopped
    ports:
      - "8080:8080"
    networks:
      - hotel-chatbot-net

volumes:
  postgres_data:
    driver: local
  n8n_data:
    driver: local

networks:
  hotel-chatbot-net:
    driver: bridge
